<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.3.4/axios.min.js"></script>
    <style>
        body{
            opacity: 1;     
            background: url(https://api.kdcc.cn) no-repeat;
            background-size: 100% 100%;
            background-attachment: fixed;
        }
        
        p {
            font-size: 30px;
            font-weight: normal;
            color: #000;
            text-align: center;
            line-height: 50px;
            font-family: "arial", "sans-serif";
        }
        .button{
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            -webkit-transition-duration: 0.4s; /* Safari */
            transition-duration: 0.4s;
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2), 0 6px 20px 0 rgba(0,0,0,0.19);
            border-radius: 12px;
           float:right;
        }
    </style>
  
</head>
<body>
 
    <p id="words">words for one day</p>
    

    
    <button class="button" onclick="openmusic()">
        播放 <audio id="music" src="" autoplay="autoplay" loop="loop" ></audio>
    </button>
   

    <script>
        // 随机一言
        axios.get('https://v1.hitokoto.cn/')
        .then(function (response) {
            console.log(response);
            document.getElementById('words').innerHTML = response.data.hitokoto;
        })
        .catch(function (error) {
            console.log(error);
        });

        //music
        function openmusic(){
            //网易云音乐解析url的id为网易云歌曲的id
        //   axios.get('https://api.shserve.cn/api/wyy?url=https://y.music.163.com/m/song?id=167827')
          axios.get('https://api.shserve.cn/api/wyyrp')
        .then(function (response) {
            console.log(response);
            document.getElementById('music').src = response.data.data.url;
            console.log(response.data.data.song);
        })
        .catch(function (error) {
            console.log(error);
        });
        }

    </script>
</body>
</html>
